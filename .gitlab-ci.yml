stages:
  - test
  - report

variables:
  CI: 'true'

unit_tests:
  stage: test
  image: node:20
  script:
    - node --version
    - npm --version
    - npm ci
    - npm test
  artifacts:
    when: always
    paths:
      - allure-results/
      - reports/coverage/

mutation_tests:
  stage: test
  image: node:20
  script:
    - node --version
    - npm --version
    - npm ci
    - npm run test:mutation
  artifacts:
    when: always
    paths:
      - reports/mutation/

e2e_tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.47.2-jammy
  script:
    - node --version
    - npm --version
    - npm ci
    - npx playwright install
    - npm run e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - results.xml
      - allure-results/
    reports:
      junit: results.xml

allure_report:
  stage: report
  image: node:20
  dependencies:
    - unit_tests
    - e2e_tests
  script:
    - npm ci
    - npx allure generate allure-results --clean -o allure-report
  artifacts:
    when: always
    paths:
      - allure-report/
    expose_as: 'Allure Report'
  when: always
