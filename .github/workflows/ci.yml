name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit_tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            allure-results/
            reports/coverage/

  mutation_tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: npm run test:mutation

      - name: Upload mutation test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: reports/mutation/

  e2e_tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload E2E test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            playwright-report/
            test-results/
            results.xml
            allure-results/

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: results.xml

  allure_report:
    runs-on: self-hosted
    needs: [unit_tests, e2e_tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java (required by Allure)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results

      - name: Install dependencies
        run: npm ci

      - name: Generate Allure report
        shell: node {0}
        run: |
          const { execFileSync } = require('child_process');
          const path = require('path');
          const fs = require('fs');
          const allureLib = path.resolve('node_modules/allure-commandline/dist/allure/lib');
          const jar = fs.readdirSync(allureLib).find(f => f.endsWith('.jar'));
          const javaExe = path.join(process.env.JAVA_HOME, 'bin', 'java.exe');
          execFileSync(javaExe, ['-jar', path.join(allureLib, jar), 'generate', 'allure-results', '--clean', '-o', 'allure-report'], {
            stdio: 'inherit',
          });

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
